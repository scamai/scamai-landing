steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-east1-docker.pkg.dev/$PROJECT_ID/sentinel-landing/scamai-landing:$BRANCH_NAME'
      - '-t'
      - 'us-east1-docker.pkg.dev/$PROJECT_ID/sentinel-landing/scamai-landing:$SHORT_SHA'
      - '.'

  # Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'us-east1-docker.pkg.dev/$PROJECT_ID/sentinel-landing/scamai-landing'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'scamai-landing-dev'
      - '--image'
      - 'us-east1-docker.pkg.dev/$PROJECT_ID/sentinel-landing/scamai-landing:$SHORT_SHA'
      - '--region'
      - 'us-east1'
      - '--project'
      - '$PROJECT_ID'

images:
  - 'us-east1-docker.pkg.dev/$PROJECT_ID/sentinel-landing/scamai-landing:$BRANCH_NAME'
  - 'us-east1-docker.pkg.dev/$PROJECT_ID/sentinel-landing/scamai-landing:$SHORT_SHA'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: 'CLOUD_LOGGING_ONLY'

timeout: '1200s'
